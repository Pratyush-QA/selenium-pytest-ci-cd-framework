# =============================================================================
# config.ini — Environment configuration for the UI framework
# =============================================================================
# Switch environments:  export ENV=staging  (or set in Docker / CI)
# =============================================================================

[dev]
base_url         = https://the-internet.herokuapp.com
implicit_wait    = 0
explicit_wait    = 10
page_load_timeout = 30
browser          = chrome
headless         = false
screenshot_dir   = screenshots
driver_mode      = selenium_manager
# driver_mode options:
#   selenium_manager  → Selenium 4.6+ built-in, zero config needed
#   webdriver_manager → uses webdriver-manager pip package

[staging]
base_url         = https://the-internet.herokuapp.com
implicit_wait    = 0
explicit_wait    = 15
page_load_timeout = 45
browser          = chrome
headless         = true
screenshot_dir   = screenshots
driver_mode      = selenium_manager

[ci]
base_url         = https://the-internet.herokuapp.com
implicit_wait    = 0
explicit_wait    = 15
page_load_timeout = 60
browser          = chrome
headless         = true
screenshot_dir   = screenshots
driver_mode      = selenium_manager

[common]
# Valid login credentials for the-internet.herokuapp.com /login
valid_username   = tomsmith
valid_password   = SuperSecretPassword!
invalid_username = baduser
invalid_password = wrongpass

# Allure / HTML report paths
allure_dir       = allure-results
html_report      = reports/report.html
