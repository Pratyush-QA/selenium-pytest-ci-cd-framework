# =============================================================================
# .github/workflows/ci.yml — GitHub Actions CI for UI Selenium Framework
# =============================================================================
#
# JOBS:
#   lint          → flake8 / black / isort checks
#   smoke-tests   → fast smoke tests (every push)
#   regression    → full regression matrix (Python 3.10 + 3.11)
#   allure-report → generate and upload Allure HTML report
# =============================================================================

name: UI Test Framework CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      headless:
        description: "Run in headless mode"
        default: "true"
        type: choice
        options: ["true", "false"]
      marker:
        description: "Pytest marker (smoke, regression, login, etc.)"
        default: "smoke"
        type: string
  schedule:
    - cron: "0 1 * * *"   # nightly at 1 AM UTC

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install flake8 black isort
      - run: flake8 src/ tests/ config/ --max-line-length=100 --exclude=__pycache__
      - run: black --check --diff src/ tests/ config/
      - run: isort --check-only --diff src/ tests/ config/

  # ── Smoke tests ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: "💨 Smoke Tests"
    runs-on: ubuntu-latest
    needs: lint

    env:
      ENV: ci
      HEADLESS: "true"
      DISPLAY: ":99"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # CONCEPT: GitHub-hosted ubuntu runners have Chrome pre-installed.
      # We just need to install ChromeDriver via Selenium Manager (automatic).
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p screenshots reports logs allure-results

      - name: Run smoke tests (headless)
        run: |
          pytest -m smoke \
            --headless \
            --alluredir=allure-results \
            --html=reports/smoke.html \
            --self-contained-html \
            --tb=short \
            -v \
            --junitxml=reports/smoke-junit.xml

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: |
            reports/
            screenshots/
            allure-results/
            logs/
          retention-days: 14

  # ── Regression matrix ────────────────────────────────────────────────────────
  regression-tests:
    name: "🧪 Regression — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: smoke-tests

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    env:
      ENV: ci
      HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p screenshots reports logs allure-results

      - name: Run regression tests
        run: |
          MARKER="${{ github.event.inputs.marker || 'regression' }}"
          pytest -m "$MARKER" \
            --headless \
            --alluredir=allure-results \
            --html=reports/regression-py${{ matrix.python-version }}.html \
            --self-contained-html \
            --tb=long \
            -v \
            --junitxml=reports/junit-py${{ matrix.python-version }}.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "UI Tests (Python ${{ matrix.python-version }})"
          path: "reports/junit-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload regression artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-py${{ matrix.python-version }}
          path: |
            reports/
            screenshots/
            allure-results/
            logs/
          retention-days: 30

  # ── Allure Report ─────────────────────────────────────────────────────────────
  allure-report:
    name: "📊 Allure Report"
    runs-on: ubuntu-latest
    needs: [regression-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download allure results
        uses: actions/download-artifact@v4
        with:
          pattern: "regression-*"
          merge-multiple: true
          path: allure-results/

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
