# =============================================================================
# config.ini — Environment configuration file
# =============================================================================
# Uses Python's built-in configparser format.
# Each [section] maps to an environment (dev, staging, prod).
# Loaded by config/settings.py based on the ENV environment variable.
#
# To switch environments:
#   export ENV=staging   (Linux/macOS)
#   set ENV=staging      (Windows CMD)
#   $env:ENV="staging"   (Windows PowerShell)
# =============================================================================

# ── Default / Development Environment ────────────────────────────────────────
[dev]
base_url        = https://jsonplaceholder.typicode.com
timeout         = 10
retry_count     = 3
retry_delay     = 1
log_level       = DEBUG

# Endpoints
posts_endpoint   = /posts
users_endpoint   = /users
todos_endpoint   = /todos
comments_endpoint = /comments
albums_endpoint  = /albums
photos_endpoint  = /photos

# Pagination defaults
default_page_size = 10
max_page_size     = 100


# ── Staging Environment ───────────────────────────────────────────────────────
[staging]
base_url        = https://jsonplaceholder.typicode.com
timeout         = 15
retry_count     = 2
retry_delay     = 2
log_level       = INFO

posts_endpoint   = /posts
users_endpoint   = /users
todos_endpoint   = /todos
comments_endpoint = /comments
albums_endpoint  = /albums
photos_endpoint  = /photos

default_page_size = 10
max_page_size     = 100


# ── Production Environment ────────────────────────────────────────────────────
[prod]
base_url        = https://jsonplaceholder.typicode.com
timeout         = 30
retry_count     = 1
retry_delay     = 5
log_level       = WARNING

posts_endpoint   = /posts
users_endpoint   = /users
todos_endpoint   = /todos
comments_endpoint = /comments
albums_endpoint  = /albums
photos_endpoint  = /photos

default_page_size = 10
max_page_size     = 100


# ── Shared / Common Settings (not environment-specific) ──────────────────────
[common]
# HTTP headers sent with every request
content_type    = application/json; charset=UTF-8
accept          = application/json

# Allure report output directory
allure_dir      = allure-results

# HTML report output file
html_report     = reports/report.html
