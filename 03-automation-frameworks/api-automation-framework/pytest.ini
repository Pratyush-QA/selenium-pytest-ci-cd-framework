# =============================================================================
# pytest.ini — Main pytest configuration file
# =============================================================================
# This file controls how pytest discovers, runs, and reports tests.
# It is read automatically by pytest on startup.
# Official docs: https://docs.pytest.org/en/stable/reference/customize.html
# =============================================================================

[pytest]

# ── Test Discovery ────────────────────────────────────────────────────────────
# Tell pytest where to find tests. By default it looks for test_*.py files.
testpaths = tests

# Pattern for test files (default: test_*.py)
python_files = test_*.py

# Pattern for test classes (default: Test*)
python_classes = Test*

# Pattern for test functions (default: test_*)
python_functions = test_*

# ── CLI Default Options ───────────────────────────────────────────────────────
# These options are applied automatically to every pytest run.
# -v          → verbose output (show each test name)
# --tb=short  → short traceback format on failure
# -p no:warnings → suppress Python warnings in output (optional, remove to see them)
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:warnings
    -p no:langsmith
    # ↑ Disables the langsmith pytest plugin which is auto-registered via
    # entry_points in your Anaconda environment. It is incompatible with
    # Python 3.12 (ForwardRef._evaluate() missing 'recursive_guard' arg).
    # This flag tells pytest to skip loading that plugin entirely.

# ── Custom Markers ────────────────────────────────────────────────────────────
# Register custom markers here to avoid PytestUnknownMarkWarning.
# Usage in tests: @pytest.mark.smoke, @pytest.mark.regression, etc.
# Run only smoke tests:  pytest -m smoke
# Run all except slow:   pytest -m "not slow"
markers =
    smoke:       Fast, critical-path tests that should run on every commit
    regression:  Full regression suite — runs on release branches
    sanity:      Sanity checks after deployment
    crud:        CRUD operation tests (Create, Read, Update, Delete)
    negative:    Negative / error-case tests (4xx / 5xx responses)
    slow:        Tests that take longer to run (skipped in fast pipelines)
    posts:       Tests covering the /posts endpoint
    users:       Tests covering the /users endpoint
    todos:       Tests covering the /todos endpoint
    comments:    Tests covering the /comments endpoint

# ── Logging ───────────────────────────────────────────────────────────────────
# Control live log output during test runs.
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Save logs to a file as well
log_file           = logs/pytest.log
log_file_level     = DEBUG
log_file_format    = %(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d): %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ── Timeouts ─────────────────────────────────────────────────────────────────
# Requires pytest-timeout plugin (included in requirements.txt).
# Any test that runs longer than this many seconds will fail automatically.
# timeout = 30

# ── Minimum version requirement ───────────────────────────────────────────────
minversion = 7.0
