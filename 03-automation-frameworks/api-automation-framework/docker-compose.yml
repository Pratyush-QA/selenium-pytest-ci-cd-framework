# =============================================================================
# docker-compose.yml — Multi-service Docker setup for the test framework
# =============================================================================
#
# CONCEPT: docker-compose lets you define and run multi-container setups
# from a single file. Here we define several "profiles" for different
# testing scenarios:
#
# COMMANDS:
#   # Run all tests
#   docker-compose up tests
#
#   # Run only smoke tests
#   docker-compose up smoke
#
#   # Run regression tests
#   docker-compose up regression
#
#   # Run tests + generate Allure report
#   docker-compose up allure
#
#   # Serve the Allure HTML report in your browser at http://localhost:8080
#   docker-compose --profile report up allure-server
#
#   # Clean up containers
#   docker-compose down
# =============================================================================

version: "3.9"

# ── Shared configuration ──────────────────────────────────────────────────────
# 'x-' prefix = extension (anchor) — reuse with '<<: *base'
x-base-service: &base-service
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - ENV=${ENV:-dev}              # override with: ENV=staging docker-compose up
    - PYTHONPATH=/app
  volumes:
    # Mount reports and allure-results so they persist after container exits
    - ./reports:/app/reports
    - ./allure-results:/app/allure-results
    - ./logs:/app/logs
  networks:
    - test-network

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Run ALL tests ──────────────────────────────────────────────────────────
  tests:
    <<: *base-service
    container_name: pytest-all-tests
    command: >
      pytest
      --alluredir=allure-results
      --html=reports/report.html
      --self-contained-html
      -v

  # ── Run only SMOKE tests ───────────────────────────────────────────────────
  smoke:
    <<: *base-service
    container_name: pytest-smoke
    command: >
      pytest -m smoke
      --alluredir=allure-results
      --html=reports/smoke-report.html
      --self-contained-html
      -v

  # ── Run only REGRESSION tests ──────────────────────────────────────────────
  regression:
    <<: *base-service
    container_name: pytest-regression
    command: >
      pytest -m regression
      --alluredir=allure-results
      --html=reports/regression-report.html
      --self-contained-html
      -v

  # ── Run tests IN PARALLEL (pytest-xdist) ──────────────────────────────────
  # CONCEPT: pytest-xdist runs tests across multiple CPU cores simultaneously.
  # -n auto = use all available CPUs
  # -n 4    = use exactly 4 workers
  parallel:
    <<: *base-service
    container_name: pytest-parallel
    command: >
      pytest -n auto
      --alluredir=allure-results
      --html=reports/parallel-report.html
      --self-contained-html
      -v

  # ── Run NEGATIVE tests only ────────────────────────────────────────────────
  negative:
    <<: *base-service
    container_name: pytest-negative
    command: pytest -m negative -v

  # ── Allure report server ───────────────────────────────────────────────────
  # Serves the Allure HTML report at http://localhost:8080
  # Requires allure-results to exist (run 'tests' service first)
  # Profile: only starts when --profile report is passed
  allure-server:
    image: frankescobar/allure-docker-service:latest
    container_name: allure-report-server
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 3
      KEEP_HISTORY: 1
    ports:
      - "8080:5050"
    volumes:
      - ./allure-results:/app/allure-results
      - ./allure-report:/app/default-reports
    networks:
      - test-network
    profiles:
      - report

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  test-network:
    driver: bridge
