# =============================================================================
# pytest.ini — Pytest configuration for the UI Selenium framework
# =============================================================================

[pytest]

# ── Test Discovery ────────────────────────────────────────────────────────────
testpaths    = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── CLI Default Options ───────────────────────────────────────────────────────
# --headless       → custom flag: run Chrome without a UI window (CI/Docker)
# -p no:langsmith  → disable langsmith plugin if present in Anaconda env
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:warnings
    -p no:langsmith

# ── Custom Markers ────────────────────────────────────────────────────────────
markers =
    smoke:        Fast sanity checks — run on every commit
    regression:   Full regression suite
    login:        Login / authentication tests
    interactions: UI element interaction tests (dropdowns, checkboxes, alerts)
    dynamic:      Tests for dynamically loaded / AJAX content
    windows:      Multi-window / multi-tab / iframe tests
    actions:      ActionChains — hover, drag-drop, right-click
    negative:     Negative / error-case tests
    slow:         Tests that take >10 seconds

# ── Custom CLI options (declared here so pytest knows about them) ─────────────
# These are consumed in conftest.py via request.config.getoption()
# Usage:
#   pytest --headless        → headless Chrome (default in CI)
#   pytest --browser=firefox → run on Firefox instead

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli              = true
log_cli_level        = INFO
log_cli_format       = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format  = %Y-%m-%d %H:%M:%S

log_file             = logs/pytest_ui.log
log_file_level       = DEBUG
log_file_format      = %(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d): %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ── Minimum pytest version ────────────────────────────────────────────────────
minversion = 7.0
