# =============================================================================
# grid.yaml — Selenium Grid for AWS EC2 runner
# =============================================================================
#
# CONCEPT: AWS EC2 as Jenkins Agent (not your laptop)
# ────────────────────────────────────────────────────
# This file runs on an AWS EC2 instance, not your local machine.
# Jenkins master triggers the pipeline → EC2 agent executes docker-compose.
# Your laptop does nothing except view the Jenkins UI.
#
# CONCEPT: replicas: 0 (dynamic scaling via Jenkinsfile)
# ───────────────────────────────────────────────────────
# Browser param from Jenkins → --scale chrome=1 or --scale firefox=1
# Only the selected browser node starts → no wasted EC2 resources.
#
# USAGE (via Jenkinsfile on EC2):
#   docker-compose -f grid.yaml up --scale chrome=1 -d
#   docker-compose -f grid.yaml up --scale firefox=1 -d
#   docker-compose -f grid.yaml down
# =============================================================================

services:

  hub:
    image: selenium/hub:4.18.1
    networks:
      - selenium-grid

  chrome:
    image: selenium/node-chrome:4.18.1
    shm_size: '1g'
    depends_on:
      - hub
    deploy:
      replicas: 0
    env_file: .env
    networks:
      - selenium-grid

  firefox:
    image: selenium/node-firefox:4.18.1
    shm_size: '1g'
    depends_on:
      - hub
    deploy:
      replicas: 0
    env_file: .env
    networks:
      - selenium-grid

networks:
  selenium-grid:
    driver: bridge
    name: selenium-grid
